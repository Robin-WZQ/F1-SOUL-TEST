<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>🏁 F1 SOUL · 赛车手灵魂测试</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* F1 风格：速度、科技、暗色调、红色点缀 */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Accelerate', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    
    @font-face {
      font-family: 'Accelerate';
      src: url('https://fonts.cdnfonts.com/s/14883/Formula1-Regular.woff') format('woff');
    }

    body { 
      min-height: 100vh; 
      background: linear-gradient(135deg, #0a0a0c 0%, #1a1a20 100%); 
      display: flex; justify-content: center; align-items: center; padding: 20px;
      color: #eee;
      position: relative;
      overflow-x: hidden;
    }

    /* 背景装饰：格子旗纹理 */
    body::before {
      content: "";
      position: absolute; width: 200%; height: 200%;
      background-image: linear-gradient(45deg, #111 25%, transparent 25%), 
                        linear-gradient(-45deg, #111 25%, transparent 25%),
                        linear-gradient(45deg, transparent 75%, #111 75%),
                        linear-gradient(-45deg, transparent 75%, #111 75%);
      background-size: 60px 60px;
      background-position: 0 0, 0 30px, 30px -30px, -30px 0px;
      opacity: 0.1;
      z-index: 0;
      animation: bgMove 60s linear infinite;
    }

    @keyframes bgMove { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

    .race-frame {
      max-width: 850px; width: 100%; background: rgba(20, 20, 25, 0.95);
      border: 1px solid #333; border-top: 4px solid #e10600; /* F1 红色 */
      border-radius: 4px;
      padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); position: relative;
      z-index: 1;
    }

    h1 { color: #fff; text-align: center; font-size: 2.2rem; letter-spacing: 2px; margin-bottom: 5px; font-weight: 900; text-transform: uppercase;}
    .subhead { text-align: center; color: #aaa; margin-bottom: 30px; font-style: italic; font-size: 1rem; letter-spacing: 1px;}
    
    .progress-container { margin-bottom: 35px; }
    .progress-info { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 8px; color: #e10600; font-weight: bold; text-transform: uppercase;}
    .progress-bar-bg { height: 2px; background: #333; position: relative;}
    .progress-fill { height: 100%; width: 0%; background: #e10600; transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1); box-shadow: 0 0 10px #e10600; }
    
    .question-card { min-height: 380px; }
    .question-text { font-size: 1.6rem; margin-bottom: 35px; line-height: 1.4; color: #fff; font-weight: 700;}
    
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    .option-btn { 
      background: rgba(40, 40, 50, 0.5); border: 1px solid #444; color: #ddd; 
      padding: 20px 25px; border-radius: 2px; cursor: pointer; 
      transition: all 0.2s ease-out; display: flex; align-items: center; font-size: 1.05rem;
      line-height: 1.3; position: relative; overflow: hidden;
    }
    
    .option-btn::before {
      content: ""; position: absolute; left: 0; top: 0; height: 100%; width: 0;
      background: #e10600; transition: .3s; z-index: -1;
    }

    .option-btn:hover { border-color: #e10600; color: #fff; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(225, 6, 0, 0.2);}
    .option-btn:hover::before { width: 100%; }

    .option-btn.selected { background: #e10600; color: #fff; border-color: #e10600; font-weight: bold;}
    .option-btn.selected::before { width: 100%; }

    .option-icon { margin-right: 15px; font-size: 1.2rem; opacity: 0.7; width: 20px; text-align: center;}

    .nav-buttons { display: flex; justify-content: space-between; margin-top: 40px; border-top: 1px solid #333; padding-top: 25px;}
    .nav-btn { background: none; border: 1px solid #666; color: #aaa; padding: 12px 35px; cursor: pointer; transition: 0.3s; letter-spacing: 1px; font-weight: bold; text-transform: uppercase; font-size: 0.9rem;}
    .nav-btn:hover:not(:disabled) { border-color: #fff; color: #fff; background: rgba(255,255,255,0.05);}
    .nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }
    #nextBtn { border-color: #e10600; color: #e10600; }
    #nextBtn:hover:not(:disabled) { background: #e10600; color: #fff; }

    .result-card { text-align: center; display: none; animation: resultFadeIn 1s ease-out; }
    @keyframes resultFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    .result-header { font-size: 1rem; color: #e10600; text-transform: uppercase; letter-spacing: 4px; font-weight: bold; margin-bottom: 10px;}
    .result-role { font-size: 3.5rem; color: #fff; margin-bottom: 20px; font-weight: 900; text-transform: uppercase; line-height: 1; letter-spacing: -1px;}
    .result-team { font-size: 1.2rem; color: #aaa; margin-bottom: 30px; letter-spacing: 2px;}
    .result-desc { line-height: 1.8; background: rgba(255, 255, 255, 0.03); padding: 30px; border-radius: 2px; border: 1px solid #333; text-align: left; font-size: 1.1rem; color: #ccc;}
    .result-desc strong { color: #fff; }
    
    .restart-btn { margin-top: 40px; background: #e10600; border: none; padding: 18px 50px; color: #fff; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; font-size: 1rem; transition: .3s; }
    .restart-btn:hover { background: #b30500; box-shadow: 0 0 20px rgba(225, 6, 0, 0.5); }

    /* 移动端适配 */
    @media (max-width: 768px) {
      .race-frame { padding: 25px; }
      .options-grid { grid-template-columns: 1fr; gap: 15px; }
      .question-text { font-size: 1.3rem; }
      .result-role { font-size: 2.5rem; }
    }
  </style>
</head>
<body>

<div class="race-frame">
  <div id="quizSection">
    <h1>F1 SOUL PROFILE</h1>
    <div class="subhead">—— 300KM/H 下，谁是你的灵魂分身 ——</div>
    
    <div class="progress-container">
      <div class="progress-info">
        <span id="qIndexText">LAP 1/15</span>
        <span id="qTheme">LIGHTS OUT</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    
    <div class="question-card">
      <div class="question-text" id="questionText">正在暖胎...</div>
      <div class="options-grid" id="optionsContainer"></div>
    </div>

    <div class="nav-buttons">
      <button class="nav-btn" id="prevBtn" disabled>PREV LAP</button>
      <button class="nav-btn" id="nextBtn">NEXT LAP</button>
    </div>
  </div>

  <div id="resultSection" class="result-card">
    <div class="result-header">YOUR F1 SOULMATE IS</div>
    <div class="result-role" id="resultRole">DRIVER NAME</div>
    <div class="result-team" id="resultTeam">LEGENDARY DRIVER</div>
    <div class="result-desc" id="resultDescription"></div>
    <button class="restart-btn" id="restartBtn">RESTART THE SEASON</button>
  </div>
</div>

<script>
  // 四个维度：
  // A (Aggression 激进度): 激进 vs 冷静
  // T (Tactics 策略感): 直觉 vs 算计
  // P (Politics 政治力): 纯粹车手 vs 团队领袖/政治家
  // M (Mindset 心理素质): 情绪化 vs 钢铁意志

  const questions = [
    { text: "五灯熄灭，比赛开始！第一弯前你处于拥挤的车阵中，你会？", options: [
      { text: "找准一丝缝隙，极晚刹车，必须在第一弯贴死对手", scores: {A:3, T:0, M:1} },
      { text: "守住外线或内线，避免碰撞，比赛很长，出弯速度更重要", scores: {A:0, T:2, M:2} },
      { text: "观察前方对手的动向，利用他们的失误升位", scores: {T:2, P:1} },
      { text: "如果起步不好，我会非常沮丧，甚至可能在电台里抱怨", scores: {M:-2, A:1} }
    ]},
    { text: "排位赛 Q3 最后一次尝试，你落后队友 0.05 秒，在关键的最后一弯，你决定？", options: [
      { text: "全油门冲过去！要么杆位，要么上墙", scores: {A:3, M:2} },
      { text: "保持精准的线路，即使稍微慢一点，也要确保做出有效的圈速", scores: {A:0, T:3, M:2} },
      { text: "回想上一圈的数据，微调刹车分配，依靠计算取胜", scores: {T:3, I:1} },
      { text: "感受到巨大的压力，这可能会影响我的动作精准度", scores: {M:-2} }
    ]},
    { text: "比赛进行到一半，轮胎开始衰退，团队电台让你执行 A 策略（稳带），但你感觉能跑得更快，你会？", options: [
      { text: "“Leave me to it！” 忽视电台，按自己的节奏推进", scores: {A:2, P:-1} },
      { text: "立刻执行，团队拥有更多数据，我相信他们的判断", scores: {P:2, T:1} },
      { text: "在电台里简短确认理由，然后精准地维持轮胎刚好不崩解的最高速度", scores: {T:3, M:2} },
      { text: "开始在电台里喋喋不休地讨论策略，甚至质疑车队的决定", scores: {P:-1, M:-1} }
    ]},
    { text: "由于车队失误，你在维修区损失了 10 秒，跌出了领奖台位置，重回赛道后你？", options: [
      { text: "愤怒让我的单圈速度瞬间提升，开启狂暴的追击模式", scores: {A:3, M:-1} },
      { text: "深呼吸，忘记刚才的失误，像机器一样精准地追赶，一秒一秒追回来", scores: {M:3, T:1} },
      { text: "在电台里严厉质问团队：“What are we doing？！”", scores: {M:-2, P:-1} },
      { text: "开始计算如果维持现状，比赛结束时我能拿多少积分，是否需要争取最快圈", scores: {T:3, P:1} }
    ]},
    { text: "你的队友在比赛最后几圈紧贴着你，他有轮胎优势，车队电台让你把他放过去，你会？", options: [
      { text: "绝不！F1 没有礼物，让他自己来超", scores: {A:3, P:-2} },
      { text: "遵守车队指令，但要在媒体面前表达我的不悦", scores: {P:2, M:-1} },
      { text: "为了团队的利益快速放行，我相信车队以后会补偿我", scores: {P:3, T:1} },
      { text: "如果是传奇车手做我队友，我可能不得不放；如果是新人，休想", scores: {P:1, T:1} }
    ]},
    { text: "雨战！赛道状况非常糟糕，能见度几乎为零，你排在第三，此时你会？", options: [
      { text: "这是属于我的时刻！利用直觉找到别人不敢走的线路，全力争取分站冠军", scores: {A:3, M:2} },
      { text: "非常谨慎，甚至在电台里建议挥动红旗停止比赛，安全第一", scores: {A:-1, M:1} },
      { text: "精准控制油门和刹车，依靠对赛道物理特性的理解，维持稳定的圈速", scores: {T:3, M:2} },
      { text: "感到极度紧张，雨天比赛让我感到不舒服", scores: {M:-3} }
    ]},
    { text: "如果你的赛车在本赛季缺乏竞争力，无法争夺冠军，你会？", options: [
      { text: "依然在每一场比赛中付出 100% 的努力，哪怕只是为了拿 1 分", scores: {M:3, A:1} },
      { text: "将精力转向赛车研发，成为团队的领袖，激励大家为下赛季做准备", scores: {P:3, T:1} },
      { text: "开始感到动力不足，甚至在寻求转会的机会", scores: {M:-1, P:-1} },
      { text: "在媒体面前公开批评车队研发不力", scores: {P:-2, M:-1} }
    ]},
    { text: "面对激烈的媒体采访和对手的心理战，你的风格是？", options: [
      { text: "“我不关心别人说什么。” 极简回应，用赛道表现说话", scores: {M:3, P:1} },
      { text: "巧妙应对，甚至利用媒体散布有利于自己的信息，反击对手", scores: {P:3, T:1} },
      { text: "直率表达，甚至有时会显得过于情绪化和愤怒", scores: {M:-2, A:1} },
      { text: "总是保持微笑，彬彬有礼，不论内心如何", scores: {P:2, M:2} }
    ]},
    { text: "你最喜欢的夺冠方式是？", options: [
      { text: "在最后一圈、最后一弯，通过一次疯狂的超车夺冠", scores: {A:3, M:2} },
      { text: "杆位起步，一路巡航，以 30 秒的优势领先第二名夺冠", scores: {T:3, M:2} },
      { text: "依靠完美的轮胎策略和车队配合，在维修区完成对对手的超越夺冠", scores: {T:3, P:2} },
      { text: "在雨天或混乱的比赛中，依靠零失误夺冠", scores: {M:3, T:2} }
    ]},
    { text: "在非比赛周末，你通常会？", options: [
      { text: "回到工厂，在模拟器里泡上一整天，研究数据", scores: {T:3, I:1} },
      { text: "进行极限体能训练，挑战自己的身体极限", scores: {M:2, A:1} },
      { text: "参加时尚活动、派对，拓展自己的商业帝国", scores: {P:2} },
      { text: "彻底远离赛车，陪伴家人或进行其他高风险运动（如下山速降）", scores: {M:1} }
    ]},
    { text: "在摩纳哥这种无法超车的街道赛，你需要超越前车，你会？", options: [
      { text: "哪怕只有 1 厘米的缝隙也要尝试鱼雷式“DIVE BOMB”", scores: {A:3, M:1} },
      { text: "完全依靠维修区切策略（Overcut/Undercut）来完成超越", scores: {T:3, P:1} },
      { text: "给前车施加无尽的压力，迫使他失误，自己保持零失误", scores: {M:3, T:2} },
      { text: "如果无法超越，我会感到极度挫败并开始电台抱怨线路被挡", scores: {M:-2, A:1} }
    ]},
    { text: "你如何看待自己的队友？", options: [
      { text: "他是我在赛道上要击败的第一个人，我必须在所有环节摧毁他", scores: {A:2, P:-1} },
      { text: "他是团队的一员，我们必须合作研发赛车，击败其他车队", scores: {P:3, T:1} },
      { text: "如果他比我快，我会虚心学习他的数据", scores: {M:2, P:1} },
      { text: "如果他比我快，一定是他的车和我不一样", scores: {M:-2} }
    ]},
    { text: "当被要求形容你的驾驶风格时，你认为最准确的词是？", options: [
      { text: "本能、激进、不可预测", scores: {A:3, E:1} },
      { text: "精准、算计、像机器一样", scores: {T:3, M:2} },
      { text: "平滑、温柔、善于管理轮胎", scores: {T:2, A:-1} },
      { text: "勇敢、坚持、永不言弃", scores: {M:3, A:2} }
    ]},
    { text: "安全车出动！你排在第二，如果你进站会掉到第五但有新胎，如果不进站维持第二但轮胎很旧，你会？", options: [
      { text: "在电台里疯狂询问团队的建议，自己无法做决断", scores: {M:-2} },
      { text: "依靠直觉和对比赛局势的判断，迅速在电台里告诉团队我的决定", scores: {T:2, M:2} },
      { text: "不进站！我要在赛道上用旧胎守住位置，我能做到", scores: {A:2, M:3} },

    ]},
    { text: "你认为 F1 车手最核心的品质是？", options: [

      { text: "在极端压力下保持零失误的钢铁意志", scores: {M:3} },
      { text: "理解赛车、轮胎和数据的智力", scores: {T:3} },
      { text: "激励团队、拓展商业和媒体影响力的领袖能力", scores: {P:3} }
    ]}

  const drivers = [
    { name: "Max Verstappen", minScores: {A:15, M:12}, team: "RED BULL RACING", icon: "🦁", desc: "你是**赛道上的捕食者**。拥有无可匹敌的纯粹速度和极度激进的驾驶风格。在钢铁般的意志下，你像机器一样精准，但在面对象征性的挑战或车队失误时，你也是个直率的暴脾气。" },
    { name: "Lewis Hamilton", minScores: {T:13, M:12, P:8}, team: "LEGENDARY (MERCEDES/FERRARI)", icon: "👑", desc: "你是**赛车界的绝对王者**。不仅拥有极高的天分，更在岁月中磨练出了大师级的轮胎管理能力和比赛策略。你懂得如何在漫长的赛季中保持专注，不仅击败对手，更在心理上摧毁他们。你同时拥有强大的媒体影响力。" },
    { name: "Fernando Alonso", minScores: {P:15, T:14}, team: "ASTON MARTIN (LEGEND)", icon: "⑭", desc: "你是**围场里的绝世军师**。拥有最敏锐的比赛策略感和难以置信的赛道本能。你不仅在驾驶，更在以 300km/h 的速度下象棋。你懂得如何激励车队，同时也擅长围场内的政治和媒体心理战。" },
    { name: "Ayrton Senna", minScores: {A:18, M:15, T:-2}, team: "LEGEND (McLAREN/WILLIAMS)", icon: "🇧🇷", desc: "你是**纯粹速度的化身**。拥有极具侵略性的风格，尤其在雨天或排位赛中，你追求极限到了近乎偏执的地步。你驾驶赛车不仅是运动，更是一种灵魂的燃烧。你拒绝妥协，永不言败。" },
    { name: "Michael Schumacher", minScores: {T:15, M:15, P:10}, team: "LEGEND (FERRARI/BENETTON)", icon: "🏎️", desc: "你是**现代 F1 车手的模板**。将极度的精准、钢铁般的意志和绝佳的体能训练结合到了极致。你不仅是车手，更是车队的精神领袖和研发核心。为了胜利，你不惜牺牲一切，甚至是争议。" },
    { name: "Charles Leclerc", minScores: {A:12, M:-5, T:8}, team: "SCUDERIA FERRARI", icon: "❤️", desc: "你是**速度极快的蒙特卡洛王子**。拥有不可思议的一圈爆发力。你的风格激进且本能，但在极端压力或车队失误面前，你容易陷入自我怀疑和情绪化。你代表着车队的未来，深受喜爱。" },
    { name: "Lando Norris", minScores: {T:11, M:-2}, team: "McLAREN F1 TEAM", icon: "🇬🇧", desc: "你是**新时代的精准驾驶者**。风格平滑，极少失误，拥有绝佳的赛道视野和数据分析能力。你总是保持微笑，但在面对关键的绝杀时刻，你偶尔会显得不够果断，心理素质仍需磨练。" },
    { name: "Kimi Räikkönen", minScores: {M:18, P:-10, T:8}, team: "LEGEND (FERRARI/McLAREN)", icon: "🧊", desc: "你是**不需要面具的冰人**。拥有极高的天赋和钢铁般的意志，比赛对你来说就是纯粹的驾驶，你不关心媒体、不关心政治、甚至不关心队友。你只用赛道上的速度说话， Leave you alone。" },
    { name: "Daniel Ricciardo", minScores: {A:14, P:10, M:-5}, team: "LEGENDARY (RB/RED BULL)", icon: "🍯", desc: "你是**围场里的蜜獾**。平时总是挂着大大的笑容，深受媒体和粉丝喜爱，是团队的润滑剂。但在赛道上，你拥有惊人的晚刹车技巧和激进的鱼雷式超车。在心理遭遇打击或赛车不合心意时，你的状态容易崩解。" },
    { name: "Great Lantern", minScores: {P:-1, M:-1, A:-1, T:-1}, team: "GRANDSTAND", icon: "🏮", desc: "你是**忠实的 F1 观众**。恭喜你，你的性格不适合成为一名职业赛车手。你可能在策略感、激进或心理素质方面不达标，但没关系，围场需要像你这样理智且热情的观众来欣赏这台戏！" }
  ];

  let currentIdx = 0;
  let totalScores = { A: 0, T: 0, P: 0, M: 0 };
  let selections = [];

  function render() {
    const q = questions[currentIdx];
    document.getElementById('qIndexText').innerText = `LAP ${currentIdx + 1}/15`;
    document.getElementById('questionText').innerText = q.text;
    
    // 根据Lap数更新主题
    let themeText = "MID-RACE推进";
    if (currentIdx === 0) themeText = "LIGHTS OUT起步";
    else if (currentIdx === 1) themeText = "QUALY单圈极限";
    else if (currentIdx <= 4) themeText = "RACE STRATEGY策略";
    else if (currentIdx <= 8) themeText = "MINDSET & TEAM心态与团队";
    else if (currentIdx === 14) themeText = "CHECKERED FLAG方格旗";
    document.getElementById('qTheme').innerText = themeText;

    const container = document.getElementById('optionsContainer');
    container.innerHTML = '';
    
    // 给选项加上图标
    const icons = ['fa-bolt', 'fa-brain', 'fa-eye', 'fa-comments'];

    q.options.forEach((opt, i) => {
      const btn = document.createElement('div');
      btn.className = 'option-btn' + (selections[currentIdx] === i ? ' selected' : '');
      
      const icon = document.createElement('i');
      icon.className = `fas ${icons[i]} option-icon`;
      
      const textSpan = document.createElement('span');
      textSpan.innerText = opt.text;

      btn.appendChild(icon);
      btn.appendChild(textSpan);
      
      btn.onclick = () => {
        selections[currentIdx] = i;
        render();
      };
      container.appendChild(btn);
    });

    document.getElementById('prevBtn').disabled = currentIdx === 0;
    document.getElementById('nextBtn').innerText = currentIdx === 14 ? "FINISH LINE揭晓" : "NEXT LAP下圈";
    document.getElementById('progressFill').style.width = ((currentIdx + 1) / 15 * 100) + "%";
  }

  document.getElementById('nextBtn').onclick = () => {
    if (selections[currentIdx] === undefined) return alert("🏁 维修区通道还未开启，请先做出你的选择！");
    if (currentIdx < 14) {
      currentIdx++;
      render();
    } else {
      calculateAndShow();
    }
  };

  document.getElementById('prevBtn').onclick = () => {
    currentIdx--;
    render();
  };

  function calculateAndShow() {
    totalScores = { A: 0, T: 0, P: 0, M: 0 };
    selections.forEach((choiceIdx, qIdx) => {
      const s = questions[qIdx].options[choiceIdx].scores;
      for (let key in s) totalScores[key] += s[key];
    });

    console.log(totalScores); // 用于调试

    // 匹配逻辑：计算每个角色与用户分数的“契合度”
    let bestMatch = drivers[9]; // 默认为大吊灯
    let highestFit = -999;

    drivers.forEach((char, index) => {
      if (index === 9) return; // 跳过彩蛋车手

      let fit = 0;
      for (let key in char.minScores) {
        let score = totalScores[key];
        let target = char.minScores[key];

        // 核心得分（超过目标分）
        if (score >= target) {
          fit += (score - target) + 10; 
        } else {
          fit += (score - target); // 扣分
        }
      }
      
      if (fit > highestFit) {
        highestFit = fit;
        bestMatch = char;
      }
    });

    document.getElementById('quizSection').style.display = 'none';
    document.getElementById('resultRole').innerText = `${bestMatch.icon} ${bestMatch.name}`;
    document.getElementById('resultTeam').innerText = bestMatch.team;
    document.getElementById('resultDescription').innerHTML = bestMatch.desc;
    document.getElementById('resultSection').style.display = 'block';
  }

  document.getElementById('restartBtn').onclick = () => location.reload();
  render();
</script>

</body>
</html>
